# Fly.io configuration for iHotel backend
app = "ihotel"
primary_region = "cdg"  # Paris, France

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  DB_PATH = "/data/hilton.db"
  # Set secrets via CLI (never commit these):
  #   fly secrets set JWT_SECRET=<value> REFRESH_SECRET=<value> CORS_ORIGIN=https://mshafieee.github.io

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[mounts]
  source = "data"
  destination = "/data"
