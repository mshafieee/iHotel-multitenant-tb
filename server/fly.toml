# Fly.io configuration for iHotel backend
# Run `fly launch` inside the server/ directory to create your app,
# then update the app name below to match.

app = "ihotel-api"          # Change this to your actual app name after `fly launch`
primary_region = "sin"      # Singapore — change to nearest region (e.g. lax, iad, fra)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  # Set secrets via CLI (never commit these):
  #   fly secrets set JWT_SECRET=<value>
  #   fly secrets set REFRESH_SECRET=<value>
  #   fly secrets set CORS_ORIGIN=https://mshafieee.github.io

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

# Persistent volume for SQLite database (run once: fly volumes create ihotel_data --size 1)
[mounts]
  source = "ihotel_data"
  destination = "/data"
